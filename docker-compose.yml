services:
  echo:
    build: .
    image: echo-mock-server:latest
    container_name: echo
    ports:
      - "8080:8080"   # HTTP
      - "61616:61616" # JMS Artemis
    environment:
      - ECHO_ADMIN_USERNAME=${ECHO_ADMIN_USERNAME:-admin}       # вљ пёЏ з”џз”ўз’°еўѓи«‹ж›їжЏ›
      - ECHO_ADMIN_PASSWORD=${ECHO_ADMIN_PASSWORD:-admin}       # вљ пёЏ з”џз”ўз’°еўѓи«‹ж›їжЏ›пјЊж”ЇжЏґ bcrypt hash
      - ECHO_REMEMBER_ME_KEY=${ECHO_REMEMBER_ME_KEY:-change-me} # вљ пёЏ з”џз”ўз’°еўѓи«‹ж›їжЏ›
      - ECHO_ENV_LABEL=DOCKER
      - TZ=Asia/Taipei
    volumes:
      - echo-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/mock/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  echo-data:
