name: Auto Label PRs

on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  labeler:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: srvaroa/labeler@v1
        with:
          config_path: .github/labeler-config.yml
          use_local_config: false
          fail_on_error: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
