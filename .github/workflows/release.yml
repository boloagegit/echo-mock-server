name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and Test
        run: ./gradlew build

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          JAR_NAME="echo-server-${{ steps.version.outputs.tag }}.jar"
          cp build/libs/echo-server-*.jar "dist/${JAR_NAME}"
          cd dist
          shasum -a 256 "${JAR_NAME}" > "${JAR_NAME}.sha256"

      - name: Smoke test JAR
        run: |
          timeout 15 java -jar dist/echo-server-*.jar \
            --spring.profiles.active=dev \
            --server.port=0 \
            || [ $? -eq 124 ]

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/echo-server-*.jar
            dist/echo-server-*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
