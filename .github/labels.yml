# Echo Mock Server - GitHub Labels
# Synced by .github/workflows/manage-labels.yml

# === Type ===
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "refactor"
  color: "d4c5f9"
  description: "Code improvement without changing behavior"

- name: "chore"
  color: "ededed"
  description: "Maintenance tasks, CI, dependencies"

# === Priority ===
- name: "priority:high"
  color: "e11d48"
  description: "Needs immediate attention"

- name: "priority:medium"
  color: "fbca04"
  description: "Should be addressed soon"

- name: "priority:low"
  color: "0e8a16"
  description: "Nice to have, no rush"

# === Status ===
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

# === Area ===
- name: "area:http"
  color: "1d76db"
  description: "HTTP mock protocol"

- name: "area:jms"
  color: "5319e7"
  description: "JMS mock protocol"

- name: "area:ui"
  color: "f9d0c4"
  description: "Frontend / Vue.js UI"

- name: "area:api"
  color: "bfd4f2"
  description: "Backend REST API"
