changelog:
  exclude:
    labels:
      - ignore-for-release

  categories:
    - title: Breaking Changes
      labels:
        - break-change

    - title: Bug Fixes
      labels:
        - Bugfix
        - Bug

    - title: Enhancements
      labels:
        - enhancement
        - Back End
        - API
        - JMS

    - title: Minor Enhancements
      labels:
        - chore
        - style
        - refactor
        - perf

    - title: Docker Updates
      labels:
        - Docker

    - title: Documentation
      labels:
        - Documentation

    - title: Dependencies
      labels:
        - dependencies

    - title: Other Changes
      labels:
        - "*"
